<svg width="460" height="140" viewBox="0 0 460 140" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <style>
      .brand {
        font-family: 'Montserrat', Arial, sans-serif;
        font-size: 36px;
        font-weight: 600;
        letter-spacing: 2px;
        fill: #1F1F1F;
      }

      .sub {
        font-family: 'Montserrat', Arial, sans-serif;
        font-size: 12px;
        font-weight: 500;
        letter-spacing: 4px;
        fill: #8A8A8A;
      }
    </style>
  </defs>

  <!-- Icono elegante -->
  <g transform="translate(20 20)">

    <!-- Círculo minimal -->
    <circle cx="50" cy="50" r="42" fill="none" stroke="#C62828" stroke-width="5"></circle>

    <!-- Casa mediterránea -->
    <path d="M30 68 L50 44 L70 68" fill="none" stroke="#C62828" stroke-width="5" stroke-linecap="round" stroke-linejoin="round"></path>

    <!-- Sol -->
    <circle cx="50" cy="30" r="4.5" fill="#C62828"></circle>

  </g>

  <!-- Marca -->
  <text x="130" y="76" class="brand">
    OPPENGROUP
  </text>

  <!-- Subtexto -->
  <text x="132" y="102" class="sub">
    REAL ESTATE
  </text>

</svg>